git:
  pagers:
    - colorArg: always
      pager: delta --features=catppuccin-macchiato --paging=never --24-bit-color=always
gui:
  theme:
    activeBorderColor:
      - '#f5a97f'
      - bold
    inactiveBorderColor:
      - '#a5adcb'
    searchingActiveBorderColor:
      - '#eed49f'
    optionsTextColor:
      - '#8aadf4'
    selectedLineBgColor:
      - '#363a4f'
    inactiveViewSelectedLineBgColor:
      - '#6e738d'
    cherryPickedCommitFgColor:
      - '#f5a97f'
    cherryPickedCommitBgColor:
      - '#494d64'
    markedBaseCommitFgColor:
      - '#8aadf4'
    markedBaseCommitBgColor:
      - '#eed49f'
    unstagedChangesColor:
      - '#ed8796'
    defaultFgColor:
      - '#cad3f5'
  authorColors:
    '*': '#b7bdf8'
os:
  edit: "nvim --server $NVIM --remote {{filename}} && nvim --server $NVIM --remote-send ':doautocmd User LazyGitEdit<CR>'"
  editAtLine: "nvim --server $NVIM --remote {{filename}} && nvim --server $NVIM --remote-send ':{{line}}<CR>' && nvim --server $NVIM --remote-send ':doautocmd User LazyGitEdit<CR>'"
  editInTerminal: false
customCommands:
  - key: 'G'
    context: 'global'
    command: "git gone"
