# Set prefix
unbind C-b
unbind C-j
set -g prefix C-\;
bind C-\; send-prefix

# switch windows alt-h alt-l
bind -n m-H previous-window
bind -n m-L next-window

# switch windows alt+number
bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5
bind-key -n M-6 select-window -t 6
bind-key -n M-7 select-window -t 7
bind-key -n M-8 select-window -t 8
bind-key -n M-9 select-window -t 9

# Set true color
# set-option -sa terminal-overrides ",xterm*:Tc"
#
set -g -q mouse on
set -g detach-on-destroy off
set -g allow-passthrough on

bind -n WheelUpPane copy-mode -e

# Extended keys for modern terminals (Ghostty) - needed for combos like Shift+Enter
set -s extended-keys on
set -s extended-keys-format csi-u
set -as terminal-features ',xterm-ghostty:extkeys'

# set -g default-terminal "tmux-256color"

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1

# set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_flavor "macchiato" # latte, frappe, macchiato or mocha

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @yank_action 'copy-pipe-no-clear'
set -g @plugin 'nhdaly/tmux-better-mouse-mode'

# Status bar setup
set -g status-justify left
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
# set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
# set -agF status-right "#{E:@catppuccin_status_battery}"

# Tmux yank vi setup
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi C-v send-keys -X begin-selection
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-no-clear

# Open panes in current directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# swap window to left or right
bind-key -r < swap-window -d -t -1
bind-key -r > swap-window -d -t +1

set -g window-style 'fg=#a5adcb,bg=#1e2030'
set -g window-active-style 'fg=#cad3f5,bg=#24273a'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

set -g window-status-format "#I"
set -g window-status-current-format "#I"
set -g window-status-style "fg=brightblack"
set -g window-status-current-style "fg=magenta,bold"
set -g window-status-bell-style "fg=red,nobold"

# Prefix + n: pi 피드백 임시 에디터(아래 pane) 토글
bind-key n run-shell "~/.tmux/scripts/pi-feedback-toggle.sh '#{pane_id}' '#{window_id}' '#{pane_current_path}'"
